<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🫵open it, my girlll</title>
    <style>
        /* 
         * ==========================================
         * 1. 基础样式模块 (Base Styles)
         * 作用：重置样式，设置背景和布局容器
         * ==========================================
         */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* 移除移动端点击高亮 */
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            /* 温馨日式木质桌面背景 */
            background-color: #5d4037;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 80px,
                    rgba(0, 0, 0, 0.1) 80px,
                    rgba(0, 0, 0, 0.1) 82px
                ),
                linear-gradient(
                    to bottom,
                    rgba(255, 255, 255, 0.05) 0%,
                    rgba(0, 0, 0, 0.1) 100%
                );
            font-family: "Microsoft YaHei", "Lantinghei SC", "Hiragino Sans GB", "Helvetica Neue", Helvetica, Arial, sans-serif; /* 更圆润可爱的字体堆栈 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 竹帘/餐垫 */
        #table-mat {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            height: 380px;
            background: #e6ceac;
            background-image: repeating-linear-gradient(
                to bottom,
                transparent,
                transparent 4px,
                rgba(139, 69, 19, 0.2) 4px,
                rgba(139, 69, 19, 0.2) 6px
            );
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* 
         * ==========================================
         * 2. 游戏元素样式模块 (Game Elements)
         * 作用：定义碟子、寿司、文字的视觉表现
         * ==========================================
         */
        .row {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            width: 100%;
        }

        .plate-container {
            position: relative;
            width: 80px;
            height: 80px;
            margin: 0 10px;
            perspective: 1000px;
        }

        /* 碟子样式 */
        .plate {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 50%;
            border: 6px solid #dcdcdc;
            /* 通过多重投影制造碟子的厚度感 */
            box-shadow: 
                0 4px 0 #b0b0b0,
                0 6px 0 #888,
                0 10px 15px rgba(0,0,0,0.2); 
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 0;
            left: 0;
            transform: rotateX(20deg); /* 增加一点俯视倾斜感 */
        }

        /* 碟子底下的字 */
        .plate-text {
            font-size: 32px;
            font-weight: bold;
            color: #d0ffd0; /* 淡绿色 (Pale Green) */
            opacity: 0; 
            transition: opacity 0.5s ease-out;
            user-select: none;
            text-shadow: 1px 1px 2px rgba(120, 5, 95, 0.838); /* 增加一点阴影让浅色在白底更清晰 */
        }

        .plate-text.visible {
            opacity: 1;
        }

        /* 寿司样式 */
        .sushi {
            position: absolute;
            top: -10px; /* 让寿司稍微浮在碟子上 */
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s;
            filter: drop-shadow(0 8px 4px rgba(0,0,0,0.3)); /* 增强阴影，体现立体高度 */
        }

        /* 寿司被“吃掉”时的动画类 */
        .sushi.eaten {
            animation: eat-animation 0.8s forwards cubic-bezier(0.5, -0.5, 0.5, 1.5);
            pointer-events: none;
        }

        @keyframes eat-animation {
            0% { transform: translateY(0) scale(1) rotate(0); }
            30% { transform: translateY(-40px) scale(1.2) rotate(-10deg); } /* 向上夹起 */
            100% { transform: translateY(500px) scale(0.1) rotate(45deg); opacity: 0; } /* 飞向碗里消失 */
        }

        /* 模拟筷子 */
        .chopsticks {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(-45deg);
            font-size: 40px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            z-index: 30;
        }

        .sushi.eaten + .chopsticks {
            animation: chopsticks-anim 0.8s forwards;
        }

        @keyframes chopsticks-anim {
            0% { opacity: 0; transform: translate(-50%, 0) rotate(-45deg); }
            20% { opacity: 1; transform: translate(-50%, -20px) rotate(-45deg); }
            100% { opacity: 0; transform: translate(-50%, 400px) rotate(-45deg); }
        }

        /* 
         * ==========================================
         * 3. 辅助元素样式 (UI & Overlay)
         * 作用：提示信息、烟花画板
         * ==========================================
         */
        #hint-text {
            position: absolute;
            top: 10%;
            font-size: 18px;
            color: #fff;
            background: #ba62a4;
            padding: 8px 16px;
            border: 4px solid #ca73bd;
            box-shadow: 4px 4px 0 rgba(0,0,0,0.2);
            animation: bounce 2s infinite;
            z-index: 100;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* 烟花 Canvas */
        #fireworks-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; /* 位于背景层之上，UI层之下 */
            pointer-events: none;
            background-color: transparent;
        }
    </style>
</head>
<body>

    <!-- 背景烟花层 -->
    <canvas id="fireworks-canvas"></canvas>

    <!-- 日式餐垫 -->
    <div id="table-mat"></div>

    <div id="hint-text">YumYum🥢</div>

    <!-- 游戏主容器 -->
    <div id="game-container">
        <!-- 第一排：寿星名字 -->
        <div class="row" id="row-1">
            <!-- 由JS生成 -->
        </div>
        <!-- 第二排：祝福语 -->
        <div class="row" id="row-2">
            <!-- 由JS生成 -->
        </div>
    </div>

    <script>
        /* 
         * ==========================================
         * 4. 逻辑控制模块 (JavaScript)
         * 作用：管理游戏状态、交互动画及烟花特效
         * ==========================================
         */

        const CONFIG = {
            name: "小杨梅",
            wish: "生日快乐",
            // 3D 像素风寿司 SVG 模板 (参考卡通画风，包含侧面阴影体现立体感)
            sushiAssets: [
                // 三文鱼握寿司 (3D Nigiri)
                `<svg viewBox="0 0 32 32" width="70" height="70">
                    <!-- 饭团侧面 -->
                    <rect x="6" y="18" width="20" height="6" fill="#dcdcdc"/>
                    <!-- 饭团正面 -->
                    <rect x="6" y="16" width="20" height="4" fill="#ffffff"/>
                    <!-- 三文鱼侧面 -->
                    <rect x="4" y="12" width="24" height="6" fill="#e64a19"/>
                    <!-- 三文鱼顶面 -->
                    <rect x="4" y="8" width="24" height="6" fill="#ff7043"/>
                    <!-- 三文鱼纹理 -->
                    <rect x="8" y="9" width="2" height="4" fill="#ffab91" opacity="0.6"/>
                    <rect x="16" y="9" width="2" height="4" fill="#ffab91" opacity="0.6"/>
                    <rect x="24" y="9" width="2" height="4" fill="#ffab91" opacity="0.6"/>
                </svg>`,
                // 海苔卷 (3D Maki)
                `<svg viewBox="0 0 32 32" width="70" height="70">
                    <!-- 海苔外圈侧面 -->
                    <rect x="8" y="14" width="16" height="10" fill="#1a1a1a"/>
                    <!-- 海苔外圈顶面 -->
                    <rect x="8" y="10" width="16" height="4" fill="#333333"/>
                    <!-- 饭顶面 -->
                    <rect x="10" y="11" width="12" height="2" fill="#ffffff"/>
                    <!-- 核心填充 (黄瓜/鱼子) -->
                    <rect x="13" y="11" width="6" height="2" fill="#66bb6a"/>
                    <rect x="15" y="11" width="2" height="1" fill="#a5d6a7"/>
                </svg>`,
                // 玉子烧握寿司 (3D Tamago)
                `<svg viewBox="0 0 32 32" width="70" height="70">
                    <!-- 饭团 -->
                    <rect x="6" y="18" width="20" height="6" fill="#dcdcdc"/>
                    <rect x="6" y="16" width="20" height="4" fill="#ffffff"/>
                    <!-- 鸡蛋侧面 -->
                    <rect x="4" y="12" width="24" height="6" fill="#fbc02d"/>
                    <!-- 鸡蛋顶面 -->
                    <rect x="4" y="8" width="24" height="6" fill="#ffeb3b"/>
                    <!-- 海苔绑带 -->
                    <rect x="14" y="8" width="4" height="16" fill="#212121"/>
                </svg>`,
                // 虾寿司 (3D Ebi)
                `<svg viewBox="0 0 32 32" width="70" height="70">
                    <rect x="6" y="18" width="20" height="6" fill="#dcdcdc"/>
                    <rect x="6" y="16" width="20" height="4" fill="#ffffff"/>
                    <!-- 虾身侧面 -->
                    <rect x="4" y="12" width="24" height="5" fill="#d32f2f"/>
                    <!-- 虾身顶面 -->
                    <rect x="4" y="9" width="24" height="4" fill="#ff5252"/>
                    <!-- 虾尾 -->
                    <path d="M28 10 L32 7 L32 15 Z" fill="#d32f2f"/>
                </svg>`
            ],
            totalSushi: 0,
            eatenCount: 0
        };

        const row1 = document.getElementById('row-1');
        const row2 = document.getElementById('row-2');
        const fireworksCanvas = document.getElementById('fireworks-canvas');
        const ctx = fireworksCanvas.getContext('2d');
        const hintText = document.getElementById('hint-text');

        // 自动设置 Canvas 尺寸
        function resizeCanvas() {
            fireworksCanvas.width = window.innerWidth;
            fireworksCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        /**
         * 初始化游戏界面
         */
        function initGame() {
            // 生成第一排
            CONFIG.name.split('').forEach(char => createPlate(char, row1));
            // 生成第二排
            CONFIG.wish.split('').forEach(char => createPlate(char, row2));
            
            CONFIG.totalSushi = CONFIG.name.length + CONFIG.wish.length;
        }

        /**
         * 创建碟子和寿司元素
         */
        function createPlate(char, container) {
            const plateContainer = document.createElement('div');
            plateContainer.className = 'plate-container';

            const plate = document.createElement('div');
            plate.className = 'plate';
            
            const text = document.createElement('span');
            text.className = 'plate-text';
            text.textContent = char;

            const sushi = document.createElement('div');
            sushi.className = 'sushi';
            // 随机选一个像素寿司资产
            sushi.innerHTML = CONFIG.sushiAssets[Math.floor(Math.random() * CONFIG.sushiAssets.length)];

            const chopsticks = document.createElement('div');
            chopsticks.className = 'chopsticks';
            chopsticks.textContent = '🥢';

            // 点击事件：吃寿司
            sushi.addEventListener('touchstart', (e) => handleEat(e, sushi, text));
            sushi.addEventListener('click', (e) => handleEat(e, sushi, text));

            plate.appendChild(text);
            plateContainer.appendChild(plate);
            plateContainer.appendChild(sushi);
            plateContainer.appendChild(chopsticks);
            container.appendChild(plateContainer);
        }

        /**
         * 处理点击寿司的逻辑
         */
        function handleEat(event, sushiElement, textElement) {
            if (sushiElement.classList.contains('eaten')) return;
            
            // 阻止重复触发（针对触屏+点击混合环境）
            event.preventDefault();

            // 1. 播放“被吃掉”动画
            sushiElement.classList.add('eaten');
            
            // 2. 显示碟子底下的字
            setTimeout(() => {
                textElement.classList.add('visible');
            }, 300);

            // 3. 统计进度
            CONFIG.eatenCount++;
            
            // 检查是否全部吃完
            if (CONFIG.eatenCount === CONFIG.totalSushi) {
                triggerCelebration();
            }
        }

        /* 
         * ==========================================
         * 5. 爱心雨引擎模块 (Heart Rain Engine)
         * 作用：纯 Canvas 实现的像素爱心飘落效果
         * ==========================================
         */

        let hearts = [];

        class Heart {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * fireworksCanvas.width;
                this.y = -20 - Math.random() * 100; // 从屏幕上方开始
                this.size = Math.random() * 15 + 10; // 爱心大小
                this.speed = Math.random() * 2 + 1;  // 下落速度
                this.wind = (Math.random() - 0.5) * 0.5; // 轻微左右晃动
                this.opacity = Math.random() * 0.5 + 0.5;
                // 几种不同的粉红色
                const pinks = ['#ff80ab', '#ff4081', '#f06292', '#f48fb1'];
                this.color = pinks[Math.floor(Math.random() * pinks.length)];
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color;
                
                // 改进的 5x5 标准像素爱心形状
                const s = this.size / 5;
                ctx.translate(this.x, this.y);
                
                // 第一行：顶部两瓣
                ctx.fillRect(-s, -2*s, s, s);
                ctx.fillRect(s, -2*s, s, s);
                // 第二行：最宽部分
                ctx.fillRect(-2*s, -s, 5*s, s);
                // 第三行：中间部分
                ctx.fillRect(-2*s, 0, 5*s, s);
                // 第四行：底部收窄
                ctx.fillRect(-s, s, 3*s, s);
                // 第五行：底部尖端
                ctx.fillRect(0, 2*s, s, s);
                
                ctx.restore();
            }

            update() {
                this.y += this.speed;
                this.x += this.wind;
                
                // 如果飘出屏幕，重新从顶部开始
                if (this.y > fireworksCanvas.height + 20) {
                    this.reset();
                }
            }
        }

        let animationId;
        function animate() {
            animationId = requestAnimationFrame(animate);
            // 清除画板
            ctx.clearRect(0, 0, fireworksCanvas.width, fireworksCanvas.height);

            hearts.forEach(heart => {
                heart.update();
                heart.draw();
            });
        }

        function startHeartRain() {
            // 初始化爱心数量
            for (let i = 0; i < 50; i++) {
                hearts.push(new Heart());
            }
            animate();
        }

        /**
         * 触发全屏庆祝
         */
        function triggerCelebration() {
            hintText.style.display = 'none';
            startHeartRain();
        }

        // 启动程序
        initGame();

    </script>
</body>
</html>
